<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111111'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' fill='%23e63946'>GH</text></svg>" />
  </head>
  <body>

    <!-- You're reading the source. That means you care about the craft. So do I. -->

    <header>
      <h1>GitHub <span>Profile</span> Viewer</h1>
    </header>

    <main>

      <!-- Hero -->
      <section id="hero">
        <h2 id="hero-title">Who are you<br>looking for?</h2>
        <p id="hero-subtitle">Every developer has a story. Start exploring.</p>

        <!-- Search -->
        <div id="search-section">
          <input
            type="text"
            id="search-input"
            placeholder="Enter a GitHub username"
            autocomplete="off"
          />
          <button id="search-btn">Search</button>
        </div>

        <p id="hero-suggestions">Try searching <button class="suggestion" data-username="torvalds">torvalds</button>, <button class="suggestion" data-username="gaearon">gaearon</button> or <button class="suggestion" data-username="sindresorhus">sindresorhus</button></p>
          <button id="beginning-btn" hidden>Every story has a beginning.</button>
      </section>

      <!-- Error message -->
      <p id="error-message" hidden></p>

      <!-- Profile -->
      <section id="profile-section" hidden>

        <div id="profile-card">
          <div id="profile-avatar-wrapper">
            <img id="profile-avatar" src="" alt="User avatar" />
          </div>
          <div id="profile-info">
            <h2 id="profile-name"></h2>
            <p id="profile-username"></p>
            <p id="profile-bio"></p>
            <ul id="profile-stats">
              <li><span id="stat-repos"></span> Repos</li>
              <li><span id="stat-followers"></span> Followers</li>
              <li><span id="stat-following"></span> Following</li>
            </ul>
            <ul id="profile-links">
              <li id="link-location"></li>
              <li id="link-blog"></li>
              <li id="link-twitter"></li>
              <li id="link-github"></li>
            </ul>
          </div>
        </div>

        <!-- Languages -->
        <div id="languages-section">
          <h3>Codes in</h3>
          <div id="languages-chart"></div>
        </div>

        <!-- Repositories -->
        <div id="repos-section">
          <div id="repos-header">
            <div id="repos-title">
              <h3>Repositories</h3>
              <span id="repo-count"></span>
            </div>
            <div id="repos-toggle">
              <button class="toggle-btn active" data-sort="stars">Most Starred</button>
              <button class="toggle-btn" data-sort="updated">Recently Updated</button>
            </div>
          </div>
          <div id="repos-list"></div>
        </div>

        <div id="results-footer">
          <button id="search-again-btn">Search another story</button>
        </div>

      </section>

    </main>

    <footer>
      <p>Every profile tells a story. This one helps you read it.</p>
      <p>Made by <a href="https://github.com/bytiagodev" target="_blank">Tiago Teixeira</a> · <a href="https://bytiago.com" target="_blank">bytiago.com</a></p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
